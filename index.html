<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Scanner AI</title>
    <style>
        :root { --glow: #00ff9d; --bg: #050a0a; }
        body { margin: 0; background: var(--bg); color: var(--glow); font-family: 'Segoe UI', monospace; overflow: hidden; }
        
        /* Layout */
        #main-ui { display: flex; width: 100vw; height: 100vh; }
        #camera-section { position: relative; flex-grow: 1; border: 2px solid #1a332a; overflow: hidden; }
        #report-sidebar { width: 300px; background: rgba(0, 20, 15, 0.9); border-left: 2px solid var(--glow); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }

        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        /* Scanning Wave */
        .wave {
            position: absolute; width: 100%; height: 15px;
            background: linear-gradient(to bottom, transparent, var(--glow), transparent);
            box-shadow: 0 0 25px var(--glow);
            z-index: 5; top: 0; animation: scan 4s infinite ease-in-out; opacity: 0.6; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* Guidance Overlay */
        #overlay-ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.6); padding: 10px; border-left: 3px solid var(--glow);
        }

        /* Report Items */
        .report-entry {
            background: rgba(255,255,255,0.05); border: 1px solid #1a332a;
            padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 0.9rem;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* Start Screen */
        #start-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        button {
            background: transparent; border: 2px solid var(--glow); color: var(--glow);
            padding: 15px 30px; cursor: pointer; font-weight: bold; text-transform: uppercase;
            margin-top: 20px; transition: 0.3s;
        }
        button:hover { background: var(--glow); color: black; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>OMNI-SCANNER v3.0</h1>
        <p>I am your AI guidance system. I will identify objects and generate a retail-grade report.</p>
        <p style="color: #888;">System requires camera access to begin analysis.</p>
        <button onclick="startSystem()">Initialize Scanner</button>
    </div>

    <div id="main-ui">
        <div id="camera-section">
            <div class="wave"></div>
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div id="overlay-ui">
                <div id="status">STATUS: STANDBY</div>
                <div id="target" style="font-size: 1.5rem; font-weight: bold;">WAITING FOR TARGET...</div>
            </div>
        </div>

        <div id="report-sidebar">
            <h3 style="border-bottom: 1px solid var(--glow); padding-bottom: 10px;">SCAN REPORT</h3>
            <div id="report-list">
                </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const reportList = document.getElementById('report-list');
        const targetText = document.getElementById('target');
        const statusText = document.getElementById('status');
        const ctx = canvas.getContext('2d');
        
        let model;
        let lastDetected = "";

        async function startSystem() {
            document.getElementById('start-screen').style.display = 'none';
            statusText.innerText = "STATUS: LOADING AI BRAIN...";
            
            try {
                model = await cocoSsd.load();
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusText.innerText = "STATUS: ACTIVE";
                    detect();
                };
            } catch (err) {
                alert("Camera access denied or error occurred.");
            }
        }

        async function detect() {
            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (predictions.length > 0) {
                const mainObj = predictions[0];
                targetText.innerText = `TARGET: ${mainObj.class.toUpperCase()}`;
                
                // Draw Box
                ctx.strokeStyle = "#00ff9d";
                ctx.lineWidth = 4;
                ctx.strokeRect(mainObj.bbox[0], mainObj.bbox[1], mainObj.bbox[2], mainObj.bbox[3]);

                // Add to report if it's a new unique find in the last few seconds
                if (mainObj.class !== lastDetected && mainObj.score > 0.65) {
                    addToReport(mainObj.class, Math.round(mainObj.score * 100));
                    lastDetected = mainObj.class;
                }
            }
            requestAnimationFrame(detect);
        }

        function addToReport(name, confidence) {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'report-entry';
            entry.innerHTML = `
                <strong>[${time}]</strong><br>
                OBJECT: ${name.toUpperCase()}<br>
                RELIABILITY: ${confidence}%<br>
                <span style="color: #888; font-size: 0.7rem;">Verified by Google Vision Model</span>
            `;
            reportList.prepend(entry);
        }
    </script>
</body>
</html>
